{% extends "base.html" %}
{% block title %}Добавить контрагента - MaterialSys{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Добавить контрагента</h1>
</div>

<div class="card" style="max-width: 600px;">
    <form method="post">
        {% csrf_token %}
        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;">
            <div class="form-group">
                <label class="form-label">Название *</label>
                {{ form.name }}
            </div>
            <div class="form-group">
                <label class="form-label">Тип *</label>
                {{ form.contractor_type }}
            </div>
            <div class="form-group" style="grid-column: 1 / -1;">
                <label class="form-label">Адрес *</label>
                {{ form.address }}
            </div>
            <div class="form-group" style="grid-column: 1 / -1;">
                <label class="form-label">Контактная информация</label>
                {{ form.contact_info }}
            </div>
        </div>
        <div style="margin-top: 24px; display: flex; gap: 12px;">
            <button type="submit" class="btn btn-primary">💾 Сохранить</button>
            <a href="{% url 'contractors' %}" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
