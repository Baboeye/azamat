{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - MaterialSys</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Стили только для страницы входа */
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center, #1a1f2e 0%, #0a0e17 100%);
            padding: 20px;
        }
        
        .login-card {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(20px);
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-logo h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #00eaff 0%, #0077ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        
        .login-logo p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }
        
        .login-form .form-group {
            margin-bottom: 20px;
        }
        
        .login-form label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .login-form input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        
        .login-form input:focus {
            outline: none;
            border-color: #00eaff;
            box-shadow: 0 0 0 3px rgba(0, 234, 255, 0.1);
        }
        
        .login-form input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        
        .login-button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: linear-gradient(135deg, #00eaff 0%, #0077ff 100%);
            border: none;
            border-radius: 12px;
            color: #000;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 234, 255, 0.4);
        }
        
        .login-error {
            background: rgba(255, 65, 108, 0.1);
            border: 1px solid #ff416c;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 20px;
            color: #ff416c;
            font-size: 14px;
        }
        
        .login-demo {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .login-demo p {
            margin-bottom: 4px;
        }
    </style>
</head>
<body class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <h1>Азнакай киемнерэ</h1>
            <p>Учет материалов для швейного производства</p>
        </div>
        
        <form method="post" class="login-form">
            {% csrf_token %}
            
            {% if form.non_field_errors %}
            <div class="login-error">
                {{ form.non_field_errors }}
            </div>
            {% endif %}
            
            <div class="form-group">
                <label for="id_username">Логин</label>
                <input type="text" name="username" id="id_username" placeholder="Введите логин" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="id_password">Пароль</label>
                <input type="password" name="password" id="id_password" placeholder="Введите пароль" required>
            </div>
            
            <button type="submit" class="login-button">Войти в систему</button>
        </form>
        
        <div class="login-demo">
            <p><strong>Демо-доступ:</strong></p>
            <p>admin / admin</p>
        </div>
    </div>
</body>
</html>
